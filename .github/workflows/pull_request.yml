name: Pull Request Build
# For pull requests: builds and test
on:
  push:
    branches:
      - '!master'
  pull_request:
    branches:
      - master
      - 23.x
      - 22.x
      - 21.x
      - 20.x
      - 19.x
permissions:
  contents: read
  checks: write
  pull-requests: write
jobs:
  buildAndTest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - gradle-argument: 'assemble && ./gradlew check -x test -x testng -x testngWithJava11 -x testngWithJava17 -x testngWithJava21'
            label: 'check'
          - gradle-argument: 'testWithJava11 testngWithJava11'
            label: 'java11'
            test-results-dirs: 'testWithJava11 testngWithJava11'
          - gradle-argument: 'testWithJava17 testngWithJava17'
            label: 'java17'
            test-results-dirs: 'testWithJava17 testngWithJava17'
          - gradle-argument: 'testWithJava21 testngWithJava21'
            label: 'java21'
            test-results-dirs: 'testWithJava21 testngWithJava21'
          - gradle-argument: 'test -x testWithJava11 -x testWithJava17 -x testWithJava21 testng jacocoTestReport'
            label: 'java25'
            test-results-dirs: 'test testng'
    steps:
      - uses: actions/checkout@v6
      - uses: gradle/actions/wrapper-validation@v5
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'corretto'
      - name: build and test
        run: ./gradlew ${{matrix.gradle-argument}} --info --stacktrace
      - name: Upload Coverage HTML Report
        uses: actions/upload-artifact@v4
        if: always() && matrix.label == 'java25'
        with:
          name: jacoco-html-report
          path: build/reports/jacoco/test/html/
          retention-days: 14
      - name: Upload Coverage XML Report
        uses: actions/upload-artifact@v4
        if: always() && matrix.label == 'java25'
        with:
          name: coverage-report
          path: build/reports/jacoco/test/jacocoTestReport.xml
          retention-days: 1
      - name: Parse Test Results
        if: always() && matrix.label != 'check'
        run: |
          total=0; failures=0; errors=0; skipped=0
          for dir_name in ${{ matrix.test-results-dirs }}; do
            dir="build/test-results/$dir_name"
            for f in "$dir"/TEST-*.xml; do
              [ -f "$f" ] || continue
              t=$(grep -o 'tests="[0-9]*"' "$f" | head -1 | grep -o '[0-9]*')
              fl=$(grep -o 'failures="[0-9]*"' "$f" | head -1 | grep -o '[0-9]*')
              e=$(grep -o 'errors="[0-9]*"' "$f" | head -1 | grep -o '[0-9]*')
              s=$(grep -o 'skipped="[0-9]*"' "$f" | head -1 | grep -o '[0-9]*')
              total=$((total + ${t:-0}))
              failures=$((failures + ${fl:-0}))
              errors=$((errors + ${e:-0}))
              skipped=$((skipped + ${s:-0}))
            done
          done
          passed=$((total - failures - errors - skipped))
          mkdir -p /tmp/test-stats
          echo "{\"total\":$total,\"passed\":$passed,\"failed\":$failures,\"errors\":$errors,\"skipped\":$skipped}" \
            > "/tmp/test-stats/${{ matrix.label }}.json"
      - name: Upload Test Stats
        if: always() && matrix.label != 'check'
        uses: actions/upload-artifact@v4
        with:
          name: test-stats-${{ matrix.label }}
          path: /tmp/test-stats/${{ matrix.label }}.json
  test-summary:
    needs: buildAndTest
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download Test Stats
        uses: actions/download-artifact@v4
        with:
          pattern: test-stats-*
          merge-multiple: true
          path: test-stats/
      - name: Download Coverage Report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: coverage-report
          path: coverage/
      - name: Generate Unified Test Report Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const versions = ['java11', 'java17', 'java21', 'java25'];
            const zeroTest = { total: 0, passed: 0, failed: 0, errors: 0, skipped: 0 };
            const zeroCov = { covered: 0, missed: 0 };

            // --- Read current test stats from artifacts ---
            const current = {};
            for (const v of versions) {
              const file = path.join('test-stats', `${v}.json`);
              if (fs.existsSync(file)) {
                current[v] = JSON.parse(fs.readFileSync(file, 'utf8'));
              } else {
                current[v] = null;
              }
            }

            // --- Read baseline from repo (read-only) ---
            const baselineFile = 'test-baseline.json';
            let baseline = { tests: {}, coverage: {} };
            if (fs.existsSync(baselineFile)) {
              baseline = JSON.parse(fs.readFileSync(baselineFile, 'utf8'));
            }
            const baseTests = baseline.tests || {};
            const baseCov = (baseline.coverage || {}).overall || {};
            const baseClasses = (baseline.coverage || {}).classes || {};

            // --- Parse JaCoCo XML for coverage ---
            let covLine = null, covBranch = null, covMethod = null;
            const classCounters = {};
            const jacocoFile = path.join('coverage', 'jacocoTestReport.xml');
            if (fs.existsSync(jacocoFile)) {
              const xml = fs.readFileSync(jacocoFile, 'utf8');
              // Extract top-level counters (direct children of <report>, outside <package> tags)
              const stripped = xml.replace(/<package[\s\S]*?<\/package>/g, '');
              const re = /<counter type="(\w+)" missed="(\d+)" covered="(\d+)"\/>/g;
              let m;
              while ((m = re.exec(stripped)) !== null) {
                const entry = { covered: parseInt(m[3]), missed: parseInt(m[2]) };
                if (m[1] === 'LINE') covLine = entry;
                else if (m[1] === 'BRANCH') covBranch = entry;
                else if (m[1] === 'METHOD') covMethod = entry;
              }

              // Extract per-class counters from <package>/<class> elements
              const pkgRe = /<package\s+name="([^"]+)">([\s\S]*?)<\/package>/g;
              let pkgMatch;
              while ((pkgMatch = pkgRe.exec(xml)) !== null) {
                const pkgName = pkgMatch[1].replace(/\//g, '.');
                const pkgBody = pkgMatch[2];
                const classRe = /<class\s+name="([^"]+)"[^>]*>([\s\S]*?)<\/class>/g;
                let classMatch;
                while ((classMatch = classRe.exec(pkgBody)) !== null) {
                  const className = classMatch[1].replace(/\//g, '.');
                  const classBody = classMatch[2];
                  const counters = { line: { ...zeroCov }, branch: { ...zeroCov }, method: { ...zeroCov } };
                  const cntRe = /<counter type="(\w+)" missed="(\d+)" covered="(\d+)"\/>/g;
                  let cntMatch;
                  while ((cntMatch = cntRe.exec(classBody)) !== null) {
                    const entry = { covered: parseInt(cntMatch[3]), missed: parseInt(cntMatch[2]) };
                    if (cntMatch[1] === 'LINE') counters.line = entry;
                    else if (cntMatch[1] === 'BRANCH') counters.branch = entry;
                    else if (cntMatch[1] === 'METHOD') counters.method = entry;
                  }
                  classCounters[className] = counters;
                }
              }
            }

            // --- Helpers ---
            function delta(curr, prev, positiveIsGood) {
              const d = curr - prev;
              if (d === 0) return '±0';
              const str = d > 0 ? `+${d}` : `${d}`;
              if (positiveIsGood === undefined) return str;
              const icon = (positiveIsGood ? d > 0 : d < 0) ? ' 🟢' : ' 🔴';
              return str + icon;
            }

            function fmtCell(curr, prev, positiveIsGood) {
              return `${curr} (${delta(curr, prev, positiveIsGood)})`;
            }

            function pct(covered, missed) {
              const total = covered + missed;
              return total === 0 ? 0 : (covered / total * 100);
            }

            function fmtPct(value) {
              return value.toFixed(1) + '%';
            }

            function fmtPctDelta(curr, prev) {
              const d = curr - prev;
              if (Math.abs(d) < 0.05) return '±0.0%';
              const str = d > 0 ? `+${d.toFixed(1)}%` : `${d.toFixed(1)}%`;
              const icon = d > 0 ? ' 🟢' : ' 🔴';
              return str + icon;
            }

            // --- Build Test Results table ---
            let body = '<!-- test-report -->\n## Test Report\n\n';
            body += '### Test Results\n';
            body += '| Java Version | Total | Passed | Failed | Errors | Skipped |\n';
            body += '|:-------------|------:|-------:|-------:|-------:|--------:|\n';

            for (const v of versions) {
              const c = current[v] || zeroTest;
              const b = baseTests[v] || zeroTest;
              const label = v.replace('java', 'Java ');
              if (!current[v]) {
                body += `| ${label} | - | - | - | - | - |\n`;
              } else {
                body += `| ${label} | ${fmtCell(c.total, b.total, true)} | ${fmtCell(c.passed, b.passed, true)} | ${fmtCell(c.failed, b.failed, false)} | ${fmtCell(c.errors, b.errors, false)} | ${fmtCell(c.skipped, b.skipped)} |\n`;
              }
            }

            // Totals row
            const totalCurr = { ...zeroTest };
            const totalBase = { ...zeroTest };
            let hasAny = false;
            for (const v of versions) {
              if (current[v]) {
                hasAny = true;
                for (const k of Object.keys(zeroTest)) {
                  totalCurr[k] += current[v][k];
                  totalBase[k] += (baseTests[v] || zeroTest)[k];
                }
              }
            }
            if (hasAny) {
              body += `| **Total** | **${fmtCell(totalCurr.total, totalBase.total, true)}** | **${fmtCell(totalCurr.passed, totalBase.passed, true)}** | **${fmtCell(totalCurr.failed, totalBase.failed, false)}** | **${fmtCell(totalCurr.errors, totalBase.errors, false)}** | **${fmtCell(totalCurr.skipped, totalBase.skipped)}** |\n`;
            }

            // --- Build Coverage table ---
            if (covLine || covBranch || covMethod) {
              body += '\n### Code Coverage (Java 25)\n';
              body += '| Metric   | Covered | Missed | Coverage | vs Master |\n';
              body += '|:---------|--------:|-------:|---------:|----------:|\n';

              const metrics = [
                { name: 'Lines', curr: covLine, baseKey: 'line' },
                { name: 'Branches', curr: covBranch, baseKey: 'branch' },
                { name: 'Methods', curr: covMethod, baseKey: 'method' },
              ];

              for (const { name, curr, baseKey } of metrics) {
                if (!curr) continue;
                const b = baseCov[baseKey] || zeroCov;
                const currPct = pct(curr.covered, curr.missed);
                const basePct = pct(b.covered, b.missed);
                body += `| ${name} | ${curr.covered} | ${curr.missed} | ${fmtPct(currPct)} | ${fmtPctDelta(currPct, basePct)} |\n`;
              }

              body += '\n';

              // --- Per-class coverage deltas ---
              const changedClasses = [];
              for (const [cls, curr] of Object.entries(classCounters)) {
                const base = baseClasses[cls] || { line: zeroCov, branch: zeroCov, method: zeroCov };
                const currLinePct = pct(curr.line.covered, curr.line.missed);
                const baseLinePct = pct(base.line.covered, base.line.missed);
                const currBranchPct = pct(curr.branch.covered, curr.branch.missed);
                const baseBranchPct = pct(base.branch.covered, base.branch.missed);
                const currMethodPct = pct(curr.method.covered, curr.method.missed);
                const baseMethodPct = pct(base.method.covered, base.method.missed);
                if (Math.abs(currLinePct - baseLinePct) >= 0.05 ||
                    Math.abs(currBranchPct - baseBranchPct) >= 0.05 ||
                    Math.abs(currMethodPct - baseMethodPct) >= 0.05) {
                  changedClasses.push({
                    name: cls,
                    linePct: currLinePct, lineDelta: currLinePct - baseLinePct,
                    branchPct: currBranchPct, branchDelta: currBranchPct - baseBranchPct,
                    methodPct: currMethodPct, methodDelta: currMethodPct - baseMethodPct,
                  });
                }
              }
              // Also detect classes removed (in baseline but not in current)
              for (const cls of Object.keys(baseClasses)) {
                if (!classCounters[cls]) {
                  changedClasses.push({
                    name: cls,
                    linePct: 0, lineDelta: -pct(baseClasses[cls].line.covered, baseClasses[cls].line.missed),
                    branchPct: 0, branchDelta: -pct(baseClasses[cls].branch.covered, baseClasses[cls].branch.missed),
                    methodPct: 0, methodDelta: -pct(baseClasses[cls].method.covered, baseClasses[cls].method.missed),
                    removed: true,
                  });
                }
              }

              changedClasses.sort((a, b) => a.name.localeCompare(b.name));

              function shortenClass(name) {
                const dollarIdx = name.indexOf('$');
                const mainPart = dollarIdx >= 0 ? name.substring(0, dollarIdx) : name;
                const suffix = dollarIdx >= 0 ? name.substring(dollarIdx) : '';
                const parts = mainPart.split('.');
                const shortened = parts.map((p, i) => i < parts.length - 1 ? p[0] : p);
                const result = shortened.join('.') + suffix;
                return result.replace(/\$/g, '<br>\\$');
              }

              function fmtClassDelta(delta) {
                return fmtPctDelta(delta, 0);
              }

              if (changedClasses.length > 0) {
                body += `**Changed Class Coverage** (${changedClasses.length} ${changedClasses.length === 1 ? 'class' : 'classes'})\n\n`;
                body += '| Class | Line | Branch | Method |\n';
                body += '|:------|-----:|-------:|-------:|\n';
                for (const c of changedClasses) {
                  if (c.removed) {
                    body += `| ${shortenClass(c.name)} | *removed* | *removed* | *removed* |\n`;
                  } else {
                    body += `| ${shortenClass(c.name)} | ${fmtClassDelta(c.lineDelta)} | ${fmtClassDelta(c.branchDelta)} | ${fmtClassDelta(c.methodDelta)} |\n`;
                  }
                }
                body += '\n';
              } else {
                body += '> No per-class coverage changes detected.\n';
              }

              body += '\n> Full HTML report: build artifact `jacoco-html-report`\n';
            }

            // Timestamp
            const now = new Date().toISOString().replace('T', ' ').replace(/\.\d+Z$/, ' UTC');
            body += `\n> *Updated: ${now}*\n`;

            // --- Post or update single comment ---
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '<!-- test-report -->';
            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
  javadoc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: gradle/actions/wrapper-validation@v5
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'corretto'
      - name: Verify Javadoc
        run: ./gradlew javadoc --info --stacktrace
