name: Pull Request Build
# For pull requests: builds and test
on:
  push:
    branches:
      - '!master'
  pull_request:
    branches:
      - master
      - 23.x
      - 22.x
      - 21.x
      - 20.x
      - 19.x
permissions: # For test comment bot
  checks: write
  pull-requests: write
jobs:
  buildAndTest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        gradle-argument: [ 'assemble && ./gradlew check -x test','testWithJava11', 'testWithJava17','testWithJava21', 'test -x testWithJava11 -x testWithJava17 -x testWithJava21 jacocoTestReport' ]
    steps:
      - uses: actions/checkout@v6
      - uses: gradle/actions/wrapper-validation@v5
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'corretto'
      - name: build and test
        run: ./gradlew ${{matrix.gradle-argument}} --info --stacktrace
      - name: Publish Coverage Report
        uses: Madrapps/jacoco-report@50d3aff4548aa991e6753342d9ba291084e63848 # v1.7.2
        if: >
          always() &&
          github.event_name == 'pull_request' &&
          contains(matrix.gradle-argument, 'jacocoTestReport')
        with:
          paths: ${{ github.workspace }}/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 0
          min-coverage-changed-files: 0
          update-comment: true
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2.23.0
        if: always()
        with:
          files: |
            **/build/test-results/test/TEST-*.xml
            **/build/test-results/testWithJava11/TEST-*.xml
            **/build/test-results/testWithJava17/TEST-*.xml
            **/build/test-results/testWithJava21/TEST-*.xml
  javadoc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: gradle/actions/wrapper-validation@v5
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'corretto'
      - name: Verify Javadoc
        run: ./gradlew javadoc --info --stacktrace
